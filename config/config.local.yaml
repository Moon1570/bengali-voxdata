# Local (non-Docker) config: repo-relative paths so the pipeline runs on a
# laptop. Run commands from the repo root. The Docker config is config.yaml.
paths:
  data: ./data
  manifest: ./manifest.db
speakers:
  seed_csv: ./config/speakers_seed.csv
  webui_db: ./webui/poi.db   # POIs seeded by the researcher web UI
  use_wikidata: true
  min_speakers: 2
  languages: [bn]
collect:
  per_speaker_videos: 3
  min_duration_s: 60
  max_duration_s: 1800
  lang_filter: bn
scenes:
  detector: content
  threshold: 27.0
facetrack:
  det_model: scrfd_10g_bnkps
  det_threshold: 0.5
facerec:
  model: buffalo_l
  cosine_threshold: 0.45
asd:
  backend: talknet
  score_threshold: 0.0
audio:
  sr_asr: 16000
  sr_tts: 24000
  min_len_s: 1.0
  max_len_s: 15.0
asr:
  mode: stub
  language_code: bn-IN
  region_language_map:
    Bangladesh: bn-BD
    India: bn-IN
  max_retries: 5
  requests_per_minute: 300
sector:
  model: xlm-roberta-large
  labels: [actor, politician, news_anchor, athlete, creator, academic, other]
dialect:
  weak_label_from_region: true
quality:
  tts_min_snr_db: 20
  tts_max_overlap_s: 0.0
  asr_max_overlap_s: 0.5
verify:
  sample_size: 200
release:
  redistribute_media: false
