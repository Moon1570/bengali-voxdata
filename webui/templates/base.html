<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}POI Manager{% endblock %} · bengali-voxdata</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('index') }}">🎙️ POI Manager</a>
    <nav>
      <a href="{{ url_for('index') }}">All POIs</a>
      <a class="btn" href="{{ url_for('new_poi') }}">+ Add POI</a>
    </nav>
  </header>

  <main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <footer class="footer">bengali-voxdata · speaker seeding (stage s01)</footer>
</body>
</html>
